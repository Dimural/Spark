name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: agent/requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: python -m pip install -r agent/requirements.txt

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run agent tests
        run: python -m pytest agent/tests
